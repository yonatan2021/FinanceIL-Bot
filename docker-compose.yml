version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      - PORT=${PORT:-3000}
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_DB_URL=${AUTH_DB_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    volumes:
      - ./data:/tmp/data
      - ./data:/tmp/auth
    ports:
      - "3000:3000"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file: .env
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    volumes:
      - ./data:/app/data
    depends_on:
      - web
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - scraper
