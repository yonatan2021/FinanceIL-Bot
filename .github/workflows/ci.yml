name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prevent puppeteer from downloading Chromium during npm ci.
      # The scraper runs in Docker (with its own pinned Chromium image) — CI never runs it.
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Debug working tree after checkout
        run: |
          echo "=== pwd ===" && pwd
          echo "=== root files ===" && ls -la
          echo "=== package.json present ===" && test -f package.json && echo "YES" || echo "NO"
          echo "=== git sparse-checkout status ===" && git sparse-checkout list 2>&1 || echo "(error listing)"
          echo "=== core.sparseCheckout ===" && git config core.sparseCheckout 2>&1 || echo "(not set)"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/types
          npm run build --workspace=packages/utils
          npm run build --workspace=packages/db

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck bot
        run: tsc --noEmit -p apps/bot/tsconfig.json

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Build
        env:
          DATABASE_URL: file:/tmp/data.db
          AUTH_DB_URL: file:/tmp/auth.db
          AUTH_SECRET: build-placeholder
          DASHBOARD_PASSWORD: test
          ENCRYPTION_KEY: "00000000000000000000000000000000"
          NEXT_PUBLIC_APP_URL: http://localhost:5200
        run: npm run build --workspace=apps/web
