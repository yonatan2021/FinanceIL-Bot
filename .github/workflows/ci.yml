name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prevent puppeteer from downloading Chromium during npm ci.
      # The scraper runs in Docker (with its own pinned Chromium image) — CI never runs it.
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Pre-install diagnostics
        run: |
          echo "=== pwd ===" && pwd
          echo "=== package.json present: $(test -f package.json && echo YES || echo NO) ==="
          echo "=== npm version: $(npm --version) ==="
          echo "=== corepack enabled: $(corepack --version 2>/dev/null || echo 'no corepack') ==="
          echo "=== packageManager field: ===" && cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('packageManager', 'NOT SET'))"

      - name: Install dependencies
        run: HUSKY=0 npm ci

      - name: Post-install diagnostics
        if: always()
        run: |
          echo "=== pwd ===" && (pwd || echo 'pwd failed')
          echo "=== package.json present: $(test -f package.json && echo YES || echo NO) ==="
          echo "=== npm debug log (last 50 lines): ==="
          cat /home/runner/.npm/_logs/*.log 2>/dev/null | tail -50 || echo "no npm log"

      - name: Build packages
        run: |
          npm run build --workspace=packages/types
          npm run build --workspace=packages/utils
          npm run build --workspace=packages/db

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck bot
        run: tsc --noEmit -p apps/bot/tsconfig.json

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Build
        env:
          DATABASE_URL: file:/tmp/data.db
          AUTH_DB_URL: file:/tmp/auth.db
          AUTH_SECRET: build-placeholder
          DASHBOARD_PASSWORD: test
          ENCRYPTION_KEY: "00000000000000000000000000000000"
          NEXT_PUBLIC_APP_URL: http://localhost:5200
        run: npm run build --workspace=apps/web
